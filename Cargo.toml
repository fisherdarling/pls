[patch.crates-io]
boring = { path = "../../Opensource/boring/boring", features = [
    "rpk",
    "pq-experimental",
    "kx-safe-default",
    "kx-client-pq-supported",
] }
boring-sys = { path = "../../Opensource/boring/boring-sys", features = [
    "rpk",
    "pq-experimental",
    "kx-safe-default",
    "kx-client-pq-supported",
] }

[profile.release]
debug = true
