[workspace]
members = ["pls-parser", "pls-scanner", "pls-settings", "pls-types"]
resolver = "3"

[workspace.dependencies]
anyhow = "1"
base64 = "0.22"
bon = "3"
boring = { git = "https://github.com/fisherdarling/boring", rev = "3689ea8e658ba07f9af510423ef2a87669071913", features = [
    "rpk",
    "pq-experimental",
    "kx-safe-default",
    "kx-client-pq-supported",
] }
boring-sys = { git = "https://github.com/fisherdarling/boring", rev = "3689ea8e658ba07f9af510423ef2a87669071913", features = [
    "rpk",
    "pq-experimental",
] }
indicatif = "0.17"
tokio-boring = { git = "https://github.com/fisherdarling/boring", rev = "3689ea8e658ba07f9af510423ef2a87669071913" }
bytes = "1.10"
clap = { version = "4.5.37", features = ["derive"] }
foundations = { version = "4.5", default-features = false }
gxhash = "3.5.0"
globset = "0.4.0"
escape8259 = "0.5.3"
ignore = { version = "0.4.23", features = ["simd-accel"] }
insta = "1.43"
memmap2 = "0.9.5"
jiff = { version = "0.2.13", features = ["serde"] }
regex = { version = "1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[patch."https://github.com/fisherdarling/boring"]
boring = { path = "../../Opensource/boring/boring" }
boring-sys = { path = "../../Opensource/boring/boring-sys" }
# tokio-boring = { path = "../../Opensource/boring/tokio-boring" }

