name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # boring/boring-sys builds BoringSSL via cmake, so we build natively
        # on each platform rather than cross-compiling.
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --locked
      - name: Build
        run: cargo build --locked
      - name: Smoke test against cloudflare.com
        run: |
          set -euxo pipefail
          bin=target/debug/pls
          "$bin" connect cloudflare.com
          "$bin" connect --pqc cloudflare.com
          "$bin" connect --quic cloudflare.com
          "$bin" connect --quic --pqc cloudflare.com

  lint:
    name: Rustfmt & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rustfmt
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
