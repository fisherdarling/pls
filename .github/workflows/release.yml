name: Release

on:
  push:
    tags:
      - "v*"
  # Allow re-running the asset upload against an existing release/tag from the UI.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach binaries to (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # For tag pushes this is inferred; for workflow_dispatch we pass it in.
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: pls
          target: ${{ matrix.target }}
          # Archive/checksum naming that cargo-binstall's metadata (in Cargo.toml)
          # is configured to match: pls-<target>.tar.gz + pls-<target>.tar.gz.sha256
          archive: $bin-$target
          checksum: sha256
          locked: true
          ref: refs/tags/${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
